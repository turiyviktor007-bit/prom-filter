name: Build Both EXEs
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyinstaller requests openpyxl
      - run: pyinstaller --onefile --windowed --name PromFilter --hidden-import xml.etree.ElementTree --hidden-import xml.dom.minidom prom_filter_app.py
      - run: pyinstaller --onefile --windowed --name PromXLSGenerator --hidden-import openpyxl prom_xls_new_products.py
      - uses: actions/upload-artifact@v4
        with:
          name: Profetch-Tools-Windows
          path: |
            dist/PromFilter.exe
            dist/PromXLSGenerator.exe
          retention-days: 30
