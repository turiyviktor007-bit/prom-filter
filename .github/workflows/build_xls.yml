name: Build XLS Generator EXE
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyinstaller requests openpyxl
      - run: pyinstaller --onefile --windowed --name PromXLSGenerator --hidden-import xml.etree.ElementTree --hidden-import openpyxl prom_xls_new_products.py
      - uses: actions/upload-artifact@v4
        with:
          name: PromXLSGenerator-Windows
          path: dist/PromXLSGenerator.exe
          retention-days: 30
