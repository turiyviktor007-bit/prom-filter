name: Build Windows EXE
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyinstaller requests
      - run: pyinstaller --onefile --windowed --name PromFilter --hidden-import xml.etree.ElementTree --hidden-import xml.dom.minidom prom_filter_app.py
      - uses: actions/upload-artifact@v4
        with:
          name: PromFilter-Windows
          path: dist/PromFilter.exe
          retention-days: 30
